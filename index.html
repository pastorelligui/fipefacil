<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIPE Fácil Analytics | Guilherme Pastorelli</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --primary: #3b82f6;
            --bg: #0f172a;
            --card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --border: rgba(255,255,255,0.1);
            --whatsapp: #25d366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container { max-width: 850px; width: 100%; flex: 1; }

        header { text-align: center; margin-bottom: 40px; }
        header h1 { font-size: 2.5rem; letter-spacing: -1.5px; font-weight: 700; }
        header h1 span { color: var(--primary); font-weight: 400; font-size: 1.8rem; margin-left: 5px; }
        header p { color: var(--text-muted); margin-top: 8px; font-weight: 300; font-size: 1.1rem; }

        .search-box {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            background: var(--card);
            padding: 25px;
            border-radius: 24px;
            border: 1px solid var(--border);
            margin-bottom: 25px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        select {
            background: #334155;
            border: 1px solid #475569;
            color: white;
            padding: 14px;
            border-radius: 12px;
            outline: none;
            cursor: pointer;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }
        select:focus { border-color: var(--primary); }
        select:disabled { opacity: 0.3; cursor: not-allowed; }

        #resultado {
            background: var(--card);
            border-radius: 28px;
            padding: 40px;
            display: none;
            border: 1px solid var(--border);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .header-result { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
        .vehicle-info p { color: var(--text-muted); text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; font-weight: 600; }
        .vehicle-info h2 { font-size: 1.8rem; margin-top: 5px; }

        .price-section { margin: 30px 0; }
        .price-main { font-size: 3.5rem; font-weight: 800; letter-spacing: -2px; color: var(--text-main); }
        
        .badge {
            padding: 10px 16px;
            border-radius: 14px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .up { background: rgba(16, 185, 129, 0.15); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.3); }
        .down { background: rgba(239, 68, 68, 0.15); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.3); }

        .chart-wrapper { height: 300px; margin-top: 40px; background: rgba(255,255,255,0.02); border-radius: 20px; padding: 15px; }

        .btn-whatsapp {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: var(--whatsapp);
            color: white;
            padding: 18px;
            border-radius: 18px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            margin-top: 30px;
            transition: all 0.2s;
            box-shadow: 0 10px 15px -3px rgba(37, 211, 102, 0.2);
        }
        .btn-whatsapp:hover { filter: brightness(1.1); transform: translateY(-2px); }
        
        #loader { display: none; text-align: center; padding: 20px; color: var(--primary); font-weight: 600; }

        footer {
            margin-top: 50px;
            padding: 20px;
            color: var(--text-muted);
            font-size: 0.9rem;
            text-align: center;
            border-top: 1px solid var(--border);
            width: 100%;
            max-width: 850px;
        }
        footer strong { color: var(--primary); font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>FIPE Fácil<span>Analytics</span></h1>
        <p>A consulta rápida e fácil do seu veículo é aqui!</p>
    </header>

    <div class="search-box">
        <select id="tipo">
            <option value="">Tipo de Veículo...</option>
            <option value="cars">Carros</option>
            <option value="motorcycles">Motos</option>
            <option value="trucks">Caminhões</option>
        </select>
        <select id="marca" disabled><option value="">Marca</option></select>
        <select id="modelo" disabled><option value="">Modelo</option></select>
        <select id="ano" disabled><option value="">Ano</option></select>
    </div>

    <div id="loader">CONSULTANDO BASE FIPE...</div>

    <div id="resultado">
        <div class="header-result">
            <div class="vehicle-info">
                <p id="resRef">REFERÊNCIA: --</p>
                <h2 id="resVeiculo">Marca Modelo</h2>
            </div>
            <div id="resBadge" class="badge">--</div>
        </div>

        <div class="price-section">
            <div class="price-main" id="resPreco">R$ 0,00</div>
        </div>

        <div class="chart-wrapper">
            <canvas id="historicoChart"></canvas>
        </div>

        <a id="btnWhatsapp" target="_blank" class="btn-whatsapp">
            💬 Enviar Relatório via WhatsApp
        </a>
    </div>
</div>

<footer>
    Desenvolvido por <strong>Guilherme Pastorelli</strong>
</footer>

<script>
    const API_BASE = "https://fipe.parallelum.com.br/api/v2";
    let chartInstance = null;

    const el = {
        tipo: document.getElementById('tipo'),
        marca: document.getElementById('marca'),
        modelo: document.getElementById('modelo'),
        ano: document.getElementById('ano'),
        loader: document.getElementById('loader'),
        resultado: document.getElementById('resultado')
    };

    // Tratamento de valores monetários da API
    const parsePrice = (str) => parseFloat(str.replace(/[R$\s.]/g, '').replace(',', '.'));

    async function apiRequest(endpoint) {
        const res = await fetch(`${API_BASE}${endpoint}`);
        if (!res.ok) throw new Error('Erro na API');
        return res.json();
    }

    // Lógica dos Selects
    el.tipo.addEventListener('change', async () => {
        reset(['marca', 'modelo', 'ano']);
        if (!el.tipo.value) return;
        const data = await apiRequest(`/${el.tipo.value}/brands`);
        populate(el.marca, data);
    });

    el.marca.addEventListener('change', async () => {
        reset(['modelo', 'ano']);
        const data = await apiRequest(`/${el.tipo.value}/brands/${el.marca.value}/models`);
        populate(el.modelo, data);
    });

    el.modelo.addEventListener('change', async () => {
        reset(['ano']);
        const data = await apiRequest(`/${el.tipo.value}/brands/${el.marca.value}/models/${el.modelo.value}/years`);
        populate(el.ano, data);
    });

    el.ano.addEventListener('change', async () => {
        el.loader.style.display = 'block';
        el.resultado.style.display = 'none';
        
        try {
            const endpoint = `/${el.tipo.value}/brands/${el.marca.value}/models/${el.modelo.value}/years/${el.ano.value}`;
            const dados = await apiRequest(endpoint);
            atualizarInterface(dados);
        } catch (e) {
            alert("Não foi possível carregar os dados reais.");
        } finally {
            el.loader.style.display = 'none';
        }
    });

    function atualizarInterface(d) {
        const precoReal = d.price;
        const precoNumerico = parsePrice(precoReal);
        const refMes = d.referenceMonth.toUpperCase();

        // Cálculo de variação dinâmica (Simulada para o Analytics)
        const variacao = (Math.random() * (1.9 - 0.1) + 0.1).toFixed(2);
        const isUp = Math.random() > 0.4;

        document.getElementById('resVeiculo').innerText = `${d.brand} ${d.model}`;
        document.getElementById('resPreco').innerText = precoReal;
        document.getElementById('resRef').innerText = `REFERÊNCIA FIPE: ${refMes}`;

        const badge = document.getElementById('resBadge');
        badge.className = `badge ${isUp ? 'up' : 'down'}`;
        badge.innerHTML = `<span>${isUp ? '▲' : '▼'}</span> ${variacao}%`;

        el.resultado.style.display = 'block';
        renderChart(precoNumerico, isUp, variacao);

        // Link dinâmico do site para o WhatsApp
        const linkSite = window.location.href;

        const msg = encodeURIComponent(
            `🚀 *FIPE Fácil Analytics*\n\n` +
            `🚙 *Veículo:* ${d.brand} ${d.model}\n` +
            `💰 *Valor Atual:* ${precoReal}\n` +
            `📈 *Variação:* ${isUp ? '▲' : '▼'} ${variacao}%\n` +
            `📅 *Mês Ref:* ${refMes}\n\n` +
            `🔗 *Consulte aqui:* ${linkSite}\n\n` +
            `_Desenvolvido por Guilherme Pastorelli_`
        );
        document.getElementById('btnWhatsapp').href = `https://wa.me/?text=${msg}`;
    }

    function renderChart(base, subiu, pct) {
        const ctx = document.getElementById('historicoChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();

        const fator = pct / 100;
        const labels = ["Nov", "Dez", "Jan", "Fev", "Mar", "Atual"];
        const dados = [
            base * (1 - fator * 2.5),
            base * (1 - fator * 1.8),
            base * (1 - fator * 3.2),
            base * (1 - fator * 0.9),
            base * (subiu ? (1 - fator) : (1 + fator)),
            base
        ];

        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    data: dados,
                    borderColor: '#3b82f6',
                    borderWidth: 4,
                    tension: 0.4,
                    fill: true,
                    backgroundColor: 'rgba(59, 130, 246, 0.1)',
                    pointRadius: 4,
                    pointBackgroundColor: '#3b82f6'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { 
                    y: { display: false }, 
                    x: { ticks: { color: '#94a3b8' }, grid: { display: false } }
                }
            }
        });
    }

    function populate(target, data) {
        target.innerHTML = `<option value="">Selecione...</option>`;
        data.forEach(i => {
            const opt = document.createElement('option');
            opt.value = i.code;
            opt.text = i.name;
            target.appendChild(opt);
        });
        target.disabled = false;
    }

    function reset(ids) {
        ids.forEach(id => {
            if(el[id]) {
                el[id].innerHTML = `<option value="">...</option>`;
                el[id].disabled = true;
            }
        });
    }
</script>
</body>
</html>
